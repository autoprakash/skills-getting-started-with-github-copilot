<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-content">
        <svg class="school-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <!-- Shield background -->
          <path d="M50 10 L85 25 L85 55 Q85 75 50 90 Q15 75 15 55 L15 25 Z" fill="#1a237e" stroke="#fff" stroke-width="2"/>
          <!-- Book icon -->
          <rect x="35" y="35" width="30" height="25" rx="2" fill="#fff" opacity="0.9"/>
          <line x1="50" y1="35" x2="50" y2="60" stroke="#1a237e" stroke-width="1.5"/>
          <!-- Lines on book -->
          <line x1="38" y1="42" x2="47" y2="42" stroke="#1a237e" stroke-width="1"/>
          <line x1="38" y1="48" x2="47" y2="48" stroke="#1a237e" stroke-width="1"/>
          <line x1="38" y1="54" x2="47" y2="54" stroke="#1a237e" stroke-width="1"/>
          <line x1="53" y1="42" x2="62" y2="42" stroke="#1a237e" stroke-width="1"/>
          <line x1="53" y1="48" x2="62" y2="48" stroke="#1a237e" stroke-width="1"/>
          <line x1="53" y1="54" x2="62" y2="54" stroke="#1a237e" stroke-width="1"/>
        </svg>
        <div class="header-text">
          <h1>Mergington High School</h1>
          <h2>Extracurricular Activities</h2>
        </div>
      </div>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
